name: code-review-agent
version: "1.0.0"
description: "An OpenEnv environment for AI code reviews."
author: PratyushMeta
tags:
  - openenv
  - code-review

tasks:
  - id: task_1_easy_obvious_bug
    name: "Spot the Off-By-One"
    difficulty: easy
    description: "Identify the off-by-one error."
    max_steps: 1
    expected_max_score: 0.99

  - id: task_2_medium_multi_issue
    name: "The Messy PR"
    difficulty: medium
    description: "Identify unused import, SQL injection, and None bug."
    max_steps: 1
    expected_max_score: 0.99

  - id: task_3_hard_architecture
    name: "The N+1 Nightmare"
    difficulty: hard
    description: "Identify N+1 query and race condition."
    max_steps: 1
    expected_max_score: 0.99

observation_space:
  type: object
  fields:
    task_id: string
    pr_title: string
    pr_description: string
    files: array

action_space:
  type: object
  fields:
    action_type: string
    findings: array

reward_range:
  low: 0.01
  high: 0.99

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  grade: POST /grade
