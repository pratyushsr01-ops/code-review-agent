name: code-review-agent
version: "1.0.0"
description: "An OpenEnv environment for AI code reviews."
author: PratyushMeta
tags:
  - openenv
  - code-review

tasks:
  - id: task_1_easy_obvious_bug
    name: "Spot the Off-By-One"
    difficulty: easy
    description: "Identify the off-by-one error."
    expected_max_score: 1.0

  - id: task_2_medium_multi_issue
    name: "The Messy PR"
    difficulty: medium
    description: "Identify unused import, SQL injection, and None bug."
    expected_max_score: 1.0

  - id: task_3_hard_architecture
    name: "The N+1 Nightmare"
    difficulty: hard
    description: "Identify N+1 query and race condition."
    expected_max_score: 1.0